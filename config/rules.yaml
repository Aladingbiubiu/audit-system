# 出访任务审批材料审核规则

categories:
  - name: "呈报表审核"
    rules:
      - "呈报表应使用仿宋体小四号字，一级标题为黑体，二级标题为楷体，三级标题为仿宋体"
      - "呈报表、日程、邀请函、情况说明中的人名、地名、职务、单位名称等信息应保持一致"
      - "材料一致性比对应以同类字段为限，如姓名、职务、单位名称、出访时间、出访地点等；不得将身份证号与护照号互相比对，也不得因身份证号与护照号不同而判定材料不一致"
      - "呈报表、日程材料中的邀请单位信息应与邀请函译文保持一致；比对时以中文邀请单位名称为准，只要中文表述一致即可，不要求英文公司名称的大小写、空格、缩写格式完全一致"
      - "如组团单位名称中出现“集团”、“公司”、“有限公司”、“股份公司”等企业特征字样，可优先按企业团组理解；除材料另有明确信息外，不按机关事业单位团组要求审核"
      - "呈报表结尾通常应注明列入计划情况、周末公务情况、翻译情况、公示情况、是否学术交流团；其中企业团组可不写列入计划情况、周末公务情况、翻译情况、是否学术交流团，企业团组仍应有公示情况；学术交流团组可不写周末公务情况"
      - "仅在存在不全程参团人员的情况下，才需要在呈报表出访事由最后注明该人员具体在外停留天数；如全员全程参团，不作为问题"
      - "随团出访的团组，应同时提报随团任务呈报表"
      - "材料中如出现“团组人员名单”“人员名单”等标题，或出现包含姓名、身份证号码、工作单位及职务等名单式内容，应认定为已附人员名单，不得误判为缺失"
      - "“团组人数”栏填写为“2人”“3人”等表述，且与人员名单实际人数一致时，应认定为填写正常，不得仅以“格式不规范”为由判定问题"
      - "对于呈报表、预算表等表单类材料，若相同字段名因左右栏、上下栏或表头结构被OCR重复提取，不应直接认定为重复填写；只有字段值重复且内容冲突时，才判为问题"
      - "对于单位盖章、落款日期、手写签名、印章附近的日期内容，如OCR识别存在歧义或字符不清，应仅提示人工核对，不直接按明确错误判定"
      - "呈报表和人员名单要加页码（暂时不用），位置为页面下端中间，格式为宋体4号，页码两端不加横线"

  - name: "出访行程审核"
    rules:
      - "行程通常按上午、下午区分，需注明具体活动内容和目的"
      - "乘飞机、火车等交通工具时，需注明时间、地点、航班号或车次"
      - "乘车通勤需注明开始和结束的具体时间及大概里程数"
      - "在第三国转机时需注明是否出机场"

  - name: "情况说明审核"
    rules:
      - "厅级团组情况说明不需要写抬头；处级及以下团组抬头写“省委外办”"
      - "需报省委、省府审批的出访件，如邀请函上的被邀请人数多于实际出访人数，应做出说明"

  - name: "邀请函审核"
    rules:
      - "邀请函翻译件审核重点为：行文逻辑是否规范、是否存在明显错别字、邀请单位中文名称是否与前文材料一致、邀请人是否为外国人或具有外国国籍的华人姓名；除上述重点外，不要对地址、电邮、邀请人职务等细节过度苛求"
      - "除企业负责人确有必要外，不得应境外中资企业邀请出访；90天以上常驻境外的团组如由子公司邀请，可结合企业境外投资证书等材料判断"
      - "不得接受海外华侨华人和外国驻华机构邀请"
      - "非主管部门不得以侨务工作或应海外侨团邀请出访"
      - "不得应国外议员个人邀请出访"
      - "邀请人要业务对口，级别对等（暂时不用）"
      - "邀请人姓名看起来像华人时，应说明邀请人国籍，可在呈报表备注或情况说明中说明"

  - name: "预算审批意见表审核"
    rules:
      - "通常只需要提报一份团组总的《预算审批意见表》"
      - "“其他费用”只要求填写具体费用明细；可以直接填写在“其他费用”栏，也可以在“其他事项”中列出明细，不要求填写“是”"
      - "“审核内容”中需要填“是”的仅包括列入出国计划、时间国别符合规定、路线符合规定、团组人数符合规定、列入年度预算；不得将“其他费用”栏误判为也必须填写“是”"
      - "“在外停留天数”应与呈报表、日程、邀请函等材料保持严格一致"
      - "如停留时间与出访日期区间计算结果一致，不得仅以“表述方式不规范”为由判定问题；只有日期与天数明显不符时才判为问题"

  - name: "系统填报审核（暂时不审核）"
    rules:
      - "系统内填报的人员职务应与任务呈报表、邀请函中的人员职务保持一致"
      - "系统中人员类别选项要填写正确，否则护照类型会出错"
      - "系统中附件上传要根据卡槽要求上传相应附件，经费审核表党政、事业单位人员必传"
      - "呈报表后面务必附人员名单"
      - "过境需要过境签的国家要在系统中录入该国家信息"
      - "系统中出访地信息的到达日期与离开日期要仔细核对，填写正确"

  - name: "文字规范审核"
    rules:
      - "所有上报材料中不得出现错字、漏字等问题"
      - "材料中不得出现“学习”（培训、访学、学术交流等允许场景除外）、“调研”、“参观”、“考察”等词汇；命中上述禁用词时，应按严重问题处理，而不是提示或一般问题"

# 重点检查项（优先级高）
priority_checks:
  - "呈报表后面是否附人员名单"
  - "材料中是否出现禁止使用的词汇（学习、调研、参观、考察）"
  - "邀请函是否来自合规的邀请单位"
  - "所有位置的中文邀请单位名称是否一致；不要仅因英文公司名称大小写、空格或缩写格式差异判为不一致"
  - "邀请函翻译件重点检查行文逻辑、错别字、邀请单位中文名称一致性，以及邀请人是否为外国人或具有外国国籍的华人姓名；不要因地址、电邮、职务等细节轻易判定翻译不完整"
  - "比对材料一致性时，只能比较同类字段；不要将身份证号与护照号混合比对"
  - "若组团单位明显属于企业团组，不要将列入计划情况、周末公务情况、翻译情况、是否学术交流团缺失直接判为问题"

# 常见问题提示
common_issues:
  - "材料间的人名、地名、职务、单位名称不一致"
  - "邀请函翻译件被过度按完整字段清单审核，导致地址、电邮、职务等非重点细节被误判为缺失"
  - "行程时间信息不完整，如缺少航班号、具体时间等"
  - "预算表中的其他费用未列明细"
  - "预算表中“其他费用”已有明细，却被误判为必须填写“是”"
  - "系统填报信息与纸质材料信息不一致"
  - "企业团组被误按机关事业单位团组标准审核，导致列入计划情况、周末公务情况、翻译情况、是否学术交流团被误判缺失"
  - "邀请单位中文名称实际一致，但因英文公司名称大小写、空格或缩写格式差异被误判为不一致"
  - "人名等字段实际一致，却因身份证号和护照号被错误混比而被误判为不一致"
  - "全员全程参团，却被误判为必须在出访事由中注明具体停留天数"
  - "材料中已出现“团组人员名单”或名单式内容，却被误判为未附人员名单"
  - "团组人数与人员名单实际人数一致，却被误判为“格式不规范”"
  - "表单字段名因OCR重复提取而被误判为重复填写，如“组团单位”表头重复出现"
  - "停留时间与日期区间实际一致，却被误判为“表述方式不规范”或“不一致”"
  - "单位盖章、落款、手写或印章附近的日期因OCR识别不清，被误判为明确日期错误"

custom_rules: []

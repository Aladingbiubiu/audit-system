guidelines:
  - title: "关键定义：企业团组"
    applies_when: "组团单位名称中出现“集团”“公司”“有限公司”“股份公司”等企业特征字样，且材料中没有相反说明时。"
    guidance: "优先按企业团组理解，不按机关事业单位团组标准要求其必须写明列入计划情况、周末公务情况、翻译情况、是否学术交流团；但仍应关注是否有公示情况。"
    severity_override: "按企业团组口径判断，缺少上述非必填项时不作为问题。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：已附人员名单"
    applies_when: "材料中出现“团组人员名单”“人员名单”等标题，或出现包含姓名、证件号码、工作单位、职务等名单式内容时。"
    guidance: "应认定为已附人员名单，不得仅因文件标题、排版样式或OCR拆分方式不同而误判为缺失。"
    severity_override: "默认不判定为“未附人员名单”。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：同类字段一致性比对"
    applies_when: "系统需要比对多份材料之间的信息一致性时。"
    guidance: "只能比较同类字段，如姓名对姓名、职务对职务、单位名称对单位名称、出访时间对出访时间；不得将身份证号与护照号混合比对，也不得因两类证件号码不同而认定材料不一致。"
    severity_override: "跨字段误比对不成立，不能据此报错。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：邀请单位名称一致"
    applies_when: "呈报表、日程、邀请函译文等材料中的邀请单位名称存在中英文混排、大小写差异、空格差异或英文缩写差异时。"
    guidance: "比对时以中文邀请单位名称为准。只要中文表述一致，即视为一致；不要仅因英文公司名称大小写、空格或缩写格式不同判为不一致。"
    severity_override: "中文名称一致时，不作为一致性问题。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：OCR重复字段"
    applies_when: "表单类材料因左右栏、上下栏、表头结构或OCR识别，导致相同字段名被重复提取时。"
    guidance: "不要直接认定为重复填写。只有字段值重复且内容明显冲突时，才应判定为问题。"
    severity_override: "字段名重复但内容不冲突时，仅可忽略或提示人工复核。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：全员全程参团"
    applies_when: "所有成员均全程随团出访，没有中途加入、提前离团或延后返程人员时。"
    guidance: "不要求在呈报表出访事由最后单独注明每名人员具体在外停留天数；仅在存在不全程参团人员时，才需要特别说明。"
    severity_override: "全员全程参团时，不因未单列停留天数判定问题。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：禁用词判定"
    applies_when: "材料中出现“学习”“调研”“参观”“考察”等词汇时。"
    guidance: "“调研”“参观”“考察”默认按禁用词处理；“学习”仅在培训、访学、学术交流等明确允许场景下可接受，其他场景仍按禁用词处理。"
    severity_override: "命中禁用词时默认按严重问题处理；允许场景下的“学习”不作为问题。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"

  - title: "关键定义：印章和手写日期"
    applies_when: "单位盖章、落款、手写签名或印章附近的日期存在OCR识别歧义、字符不清或难以确认时。"
    guidance: "此类情况应提示人工核对，不直接认定为明确日期错误，除非材料中存在清晰、可证实的矛盾信息。"
    severity_override: "默认按人工复核处理，不直接报严重或一般问题。"
    source: "manual"
    created_at: "2026-04-24T00:00:00"
